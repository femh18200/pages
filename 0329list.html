<!doctype html>
<html lang="zh-Hant">
<head>

  <title>參加者查詢</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      background: #f5f7fb;
    }
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    h1 { margin: 0 0 10px; font-size: 20px; }
    .desc { font-size: 13px; color: #555; margin: 0 0 14px; line-height: 1.6; }
    .search-box {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      padding: 12px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    input[type="search"]{
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #ccc;
      outline: none;
    }
    input[type="search"]:focus{
      border-color:#2f6bff;
      box-shadow: 0 0 0 4px rgba(47,107,255,.18);
    }
    button{
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      background: #2f6bff;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover{ filter: brightness(.96); }

    .info{
      margin: 12px 2px 10px;
      font-size: 13px;
      color:#444;
      display:flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge{
      display:inline-block;
      background:#eef4ff;
      color:#2f6bff;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 650;
    }

    .list{
      background:#fff;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
      overflow:hidden;
    }
    .row{
      padding: 12px 14px;
      border-bottom: 1px solid #eee;
      display:grid;
      grid-template-columns: 160px 1fr;
      gap: 10px;
      align-items: start;
    }
    .row:last-child{ border-bottom: none; }

    .name{
      font-weight: 700;
      word-break: break-word;
    }
    .org{
      color:#333;
      word-break: break-word;
    }
    .empty{
      padding: 18px 14px;
      color:#777;
      text-align:center;
    }
    
      @media (max-width: 768px) {
  html {
    font-size: 18px;
  }
  body {
    zoom: 1.15;
  }
}
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>參加者查詢</h1>
    <p class="desc">
      可輸入「姓名」或「機構全銜」的任一部分進行查詢（寬鬆模糊搜尋、會依相似度排序）。<br>
      未輸入時顯示全部；查不到會顯示「查無此人」。
    </p>

    <div class="search-box">
      <input id="search" type="search" placeholder="例如：張家其 / 亞東醫院 / 社區健康發展中心" autocomplete="off" />
      <button id="clear" type="button">清除</button>
    </div>

    <div class="info">
      <div>顯示筆數：<span id="count" class="badge">0</span></div>
      <div id="status"></div>
    </div>

    <div class="list" id="list"></div>
  </div>

    const norm = (s) =>
      (s ?? "")
        .toString()
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " "); // 把多空白壓成一個

    const searchInput = document.getElementById("search");
    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");
    const statusEl = document.getElementById("status");
    const clearBtn = document.getElementById("clear");

    function stripMaskName(s){
  // 把遮罩符號拿掉：張X其 → 張其
  return norm(s).replace(/x/gi, "");
}

function maskedNameMatchScore(maskedNameRaw, queryRaw){
  // 回傳加分（0 表示不命中）
  const masked = norm(maskedNameRaw);
  const q = norm(queryRaw);
  if (!masked || !q) return 0;

  // 如果名單不是遮罩名（沒有X），就不走這條（交給原本 includes/startsWith）
  if (!masked.includes("x")) return 0;

  // 例：masked = "張x其" → 固定首尾字
  const first = masked[0];
  const last = masked[masked.length - 1];

  // 使用者輸入至少 2 個字，才進行遮罩推斷（避免只打一個字就誤判）
  if (q.length < 2) return 0;

  let s = 0;

  // ✅ 首尾同時命中：張家其 vs 張x其
  if (q[0] === first && q[q.length - 1] === last) s += 260;

  // ✅ 只命中首字或尾字（稍微加分，讓排序更合理）
  if (q[0] === first) s += 40;
  if (q[q.length - 1] === last) s += 40;

  // ✅ 若去掉X後（張其）是使用者輸入的子序列/包含，也加分
  const stripped = stripMaskName(masked);
  if (q.includes(stripped) || stripped.includes(q)) s += 80;

  return s;
}

    // 相似度打分（越高越前面）
    function score(item, q) {
      const name = norm(item.name);
      const org = norm(item.org);
      const dn = norm(item.displayName);
      const doo = norm(item.displayOrg);
      const all = `${name} ${org} ${dn} ${doo}`.trim();

      let s = 0;
      if (!q) return s;
      
      s += maskedNameMatchScore(item.name, q);
      s += maskedNameMatchScore(item.displayName ?? item.name, q);

      // 1) 完全相等（最強）
      if (name === q) s += 1000;
      if (org === q)  s += 950;

      // 2) 前綴命中（很像）
      if (name.startsWith(q)) s += 320;
      if (org.startsWith(q))  s += 300;

      // 3) 包含命中（寬鬆）
      if (name.includes(q)) s += 220;
      if (org.includes(q))  s += 210;
      if (all.includes(q))  s += 120;

      // 4) token 命中（用空白切；例如「亞東 醫院」）
      const tokens = q.split(/\s+/).filter(Boolean);
      for (const t of tokens) {
        if (t.length === 0) continue;
        if (name.includes(t)) s += 60;
        else if (org.includes(t)) s += 55;
        else if (all.includes(t)) s += 30;
      }

      // 5) 中文逐字命中（例如「張家其」去找「張X其」仍能排前）
      for (const ch of Array.from(q)) {
        if (!ch.trim()) continue;
        if (name.includes(ch)) s += 18;
        else if (org.includes(ch)) s += 14;
        else if (all.includes(ch)) s += 8;
      }

      // 6) 同分時的小偏好：姓名命中略優先
      if (name.includes(q)) s += 3;

      return s;
    }

    function search(qRaw) {
      const q = norm(qRaw);
      if (!q) return participants;

      return participants
        .map(p => ({ p, s: score(p, q) }))
        .filter(x => x.s > 0)
        .sort((a, b) => b.s - a.s)
        .map(x => x.p);
    }

    function render(data, qRaw) {
      const q = norm(qRaw);
      listEl.innerHTML = "";
      countEl.textContent = data.length;

      statusEl.textContent = (q && data.length === 0) ? "查無此人" : "";

      if (data.length === 0) {
        const div = document.createElement("div");
        div.className = "empty";
        div.textContent = q ? "查無此人" : "尚無資料";
        listEl.appendChild(div);
        return;
      }

      for (const item of data) {
        const row = document.createElement("div");
        row.className = "row";

        const nameEl = document.createElement("div");
        nameEl.className = "name";
        nameEl.textContent = item.displayName ?? item.name ?? "";

        const orgEl = document.createElement("div");
        orgEl.className = "org";
        orgEl.textContent = item.displayOrg ?? item.org ?? "";

        row.appendChild(nameEl);
        row.appendChild(orgEl);
        listEl.appendChild(row);
      }
    }

    function update() {
      const q = searchInput.value;
      render(search(q), q);
    }

    searchInput.addEventListener("input", update);
    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      searchInput.focus();
      update();
    });

    // 初始化：顯示全部
    render(participants, "");
