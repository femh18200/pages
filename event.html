    .meta{

    .mini{ color:#334155; font-weight:650; }

    .list{ display:flex; flex-direction:column; gap:10px; margin-top:10px; }
    .card{
      background:#fff; border-radius:14px; padding:14px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
    }
    .card.past{ opacity:.62; filter:grayscale(.15); }

    .top{ display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center; }
    .subject{ font-weight:800; font-size:16px; }
    .past-badge{

    .tag{

      padding:6px 10px; border-radius:10px;

    .loc{ color:#333; font-size:14px; line-height:1.5; }

    ];

    const TAGS = [
      { key: "乳攝", cls: "t-ms",  aliases: ["乳攝","乳房攝影","乳癌","乳癌篩檢","乳攝車"] },
      { key: "子抹", cls: "t-pap", aliases: ["子抹","抹片","子宮頸","子宮頸抹片","抹片篩檢"] },
      { key: "腸篩", cls: "t-fit", aliases: ["腸篩","大腸","大腸癌","糞便","fit"] },
      { key: "BC",   cls: "t-bc",  aliases: ["bc","bc肝","b肝","c肝","肝炎","肝篩"] },
      { key: "成老健", cls: "t-elder", aliases: ["成老健","整篩"] },
    ];

    const norm = (s) => (s ?? "").toString().trim().toLowerCase().replace(/\s+/g, " ");
    const pad2 = (n) => String(n).padStart(2, "0");

    function parseTags(desc) {
      const d = norm(desc);
      const out = [];
      for (const t of TAGS) {
        if (t.aliases.some(a => d.includes(norm(a)))) out.push(t);
      }
      return out;
    }

    function toDateTime(s){
      return new Date(s.replace(" ", "T") + ":00");
    }

    function isPastEvent(ev){
      const end = toDateTime(ev.end);
      const now = new Date();
      return !isNaN(end) && end.getTime() < now.getTime();
    }

    function formatTimeRange24(startStr, endStr){
      const start = toDateTime(startStr);
      const end   = toDateTime(endStr);
      if (isNaN(start) || isNaN(end)) return `${startStr} ~ ${endStr}`;

      const y = start.getFullYear();
      const m = pad2(start.getMonth() + 1);
      const d = pad2(start.getDate());
      const sh = pad2(start.getHours()), sm = pad2(start.getMinutes());
      const eh = pad2(end.getHours()),   em = pad2(end.getMinutes());

      return `${y}/${m}/${d} ${sh}:${sm}~${eh}:${em}`;
    }

    function searchTimeTokens(ev){
      const start = toDateTime(ev.start);
      const end = toDateTime(ev.end);
      if (isNaN(start) || isNaN(end)) return "";

      const y = start.getFullYear();
      const m = start.getMonth() + 1;
      const d = start.getDate();

      const sh = pad2(start.getHours()), sm = pad2(start.getMinutes());
      const eh = pad2(end.getHours()),   em = pad2(end.getMinutes());

      return [
        `${y}/${pad2(m)}/${pad2(d)}`,
        `${y}-${pad2(m)}-${pad2(d)}`,
        `${m}/${d}`,
        `${pad2(m)}/${pad2(d)}`,
        `${sh}:${sm}`,
        `${eh}:${em}`,
        `${start.getHours()}`,
        `${end.getHours()}`,
        `${sh}${sm}`,
        `${eh}${em}`,
      ].join(" ");
    }

    function makeMapUrl(address){
      return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(address);
    }

    function sortEvents(arr){
      return [...arr].sort((a,b)=>{
        const ta = toDateTime(a.start).getTime();
        const tb = toDateTime(b.start).getTime();
        return (isNaN(ta) ? 0 : ta) - (isNaN(tb) ? 0 : tb);
      });
    }

    // --- DOM ---
    const qEl = document.getElementById("q");
    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");
    const statusEl = document.getElementById("status");
    const statsEl = document.getElementById("stats");
    const clearBtn = document.getElementById("clearBtn");
    const fltEls = Array.from(document.querySelectorAll(".flt"));
    const showPastEl = document.getElementById("showPast");

    function getSelectedTags(){
      return fltEls.filter(x => x.checked).map(x => x.value);
    }

    // 小統計：未來 / 已結束
    function updateStats(){
      const past = events.filter(isPastEvent).length;
      const future = events.length - past;
      statsEl.textContent = `｜未來 ${future} 場 / 已結束 ${past} 場`;
    }

    function filterEvents(query, selectedTags){
      const q = norm(query);
      const selected = new Set(selectedTags.map(norm));
      const showPast = showPastEl?.checked === true;

      return sortEvents(events).filter(ev => {
        // 預設不顯示已結束
        if (!showPast && isPastEvent(ev)) return false;

        const tags = parseTags(ev.desc).map(t => t.key);
        const hasSelected = selected.size === 0 || tags.some(t => selected.has(norm(t)));
        if (!hasSelected) return false;

        if (!q) return true;

        const timeTokens = searchTimeTokens(ev);
        const hay = norm(`${ev.subject} ${ev.desc} ${ev.location} ${timeTokens}`);
        return hay.includes(q);
      });
    }

    function render(data, query){
      listEl.innerHTML = "";
      countEl.textContent = data.length;
      statusEl.textContent = (norm(query) && data.length === 0) ? "查無資料" : "";

      if (data.length === 0){
        const div = document.createElement("div");
        div.className = "empty";
        div.textContent = norm(query) ? "查無資料" : "尚無活動";
        listEl.appendChild(div);
        return;
      }

      for (const ev of data){
        const past = isPastEvent(ev);

        const card = document.createElement("div");
        card.className = "card";
        if (past) card.classList.add("past");

        const top = document.createElement("div");
        top.className = "top";

        const subject = document.createElement("div");
        subject.className = "subject";
        subject.textContent = ev.subject;

        top.appendChild(subject);

        if (past){
          const badge = document.createElement("span");
          badge.className = "past-badge";
          badge.textContent = "已結束";
          top.appendChild(badge);
        }

        card.appendChild(top);

        const tagsWrap = document.createElement("div");
        tagsWrap.className = "tags";

        const tags = parseTags(ev.desc);
        for (const t of tags){
          const tag = document.createElement("span");
          tag.className = `tag ${t.cls}`;
          tag.textContent = `[${t.key === "BC" ? "BC肝" : t.key}]`;
          tagsWrap.appendChild(tag);
        }
        card.appendChild(tagsWrap);

        const time = document.createElement("div");
        time.className = "time";
        time.textContent = formatTimeRange24(ev.start, ev.end);
        card.appendChild(time);

        const loc = document.createElement("div");
        loc.className = "loc";
        loc.textContent = `地點：${ev.location}`;
        card.appendChild(loc);

        const actions = document.createElement("div");
        actions.className = "actions";

        const map = document.createElement("a");
        map.className = "link";
        map.href = makeMapUrl(ev.location);
        map.target = "_blank";
        map.rel = "noopener noreferrer";
        map.textContent = "🗺️ map（Google 地圖）";

        actions.appendChild(map);
        card.appendChild(actions);

        listEl.appendChild(card);
      }
    }

    function update(){
      const data = filterEvents(qEl.value, getSelectedTags());
      render(data, qEl.value);
    }

    // events
    qEl.addEventListener("input", update);
    fltEls.forEach(el => el.addEventListener("change", update));
    showPastEl.addEventListener("change", update);

    clearBtn.addEventListener("click", () => {
      qEl.value = "";
      fltEls.forEach(el => el.checked = false);
      showPastEl.checked = false; // 回到預設：不顯示已結束
      qEl.focus();
      update();
    });

    // init
    updateStats();
    update();
  </script>
