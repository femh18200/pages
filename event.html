  <style>
    body{ margin:0; font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",Arial,sans-serif; background:#f5f7fb; }
    .wrap{ max-width:920px; margin:0 auto; padding:20px 14px 44px; }
   
    h1{ margin:0 0 10px; font-size:25px; }
    .sub{ margin:0 0 14px; color:#555; font-size:13px; line-height:1.6; }

    .bar{
      position:sticky; top:0; z-index:10;
      background:#fff; border-radius:14px; padding:12px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    }
    input[type="search"]{
      flex:1; min-width:220px;
      padding:12px 12px; font-size:16px;
      border-radius:12px; border:1px solid #ccc; outline:none;
    }
    input[type="search"]:focus{ border-color:#2f6bff; box-shadow:0 0 0 4px rgba(47,107,255,.18); }

    .chips{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .chip{
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 10px; border-radius:999px;
      border:1px solid #e3e6ee; background:#fafbff;
      font-size:13px; cursor:pointer; user-select:none;
    }
    .chip input{ width:16px; height:16px; }

    button{
      padding:12px 14px; border:none; border-radius:12px;
      background:#2f6bff; color:#fff; font-size:14px; cursor:pointer;
      white-space:nowrap;
    }
    button:hover{ filter: brightness(.96); }

    .meta{
      margin:12px 2px 10px; font-size:13px; color:#444;
      display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;
      align-items:center;
    }
    .badge{ display:inline-block; background:#eef4ff; color:#2f6bff; padding:4px 10px; border-radius:999px; font-weight:650; }
    .mini{ color:#334155; font-weight:650; }

    .list{ display:flex; flex-direction:column; gap:10px; margin-top:10px; }
    .card{
      background:#fff; border-radius:14px; padding:14px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
    }
    .card.past{ opacity:.62; filter:grayscale(.15); }

    .top{ display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center; }
    .subject{ font-weight:800; font-size:16px; }
    .past-badge{
      display:inline-block;
      font-size:12px;
      font-weight:800;
      padding:6px 10px;
      border-radius:999px;
      background:#f1f5f9;
      color:#334155;
      border:1px solid #e2e8f0;
      white-space:nowrap;
    }

    .tags{ display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 10px; }
    .tag{
      font-size:12px; font-weight:800;
      padding:6px 10px; border-radius:10px;
      border:1px solid transparent;
    }
    .t-ms { background:#fff1f2; border-color:#fecdd3; color:#9f1239; } /* 乳攝 */
    .t-pap{ background:#f0fdf4; border-color:#bbf7d0; color:#166534; } /* 子抹 */
    .t-fit{ background:#eff6ff; border-color:#bfdbfe; color:#1d4ed8; } /* 腸篩 */
    .t-bc { background:#faf5ff; border-color:#e9d5ff; color:#6b21a8; } /* BC肝 */
    .t-elder {background:#fffbeb;border-color:#fde68a;color:#92400e; } /* 成老健 */

    .time{ color:#111; font-size:14px; margin:2px 0 6px; }
    .loc{ color:#333; font-size:14px; line-height:1.5; }
    .actions{ margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
    .link{
      display:inline-flex; align-items:center; gap:8px;
      text-decoration:none; color:#2f6bff; font-weight:800;
      padding:10px 12px; border-radius:12px; border:1px solid #dbe6ff;
      background:#f7faff;
    }

    .empty{
      background:#fff; border-radius:14px; padding:18px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      text-align:center; color:#777;
    }

    { subject:"信義 景勤里區民活動中心(現場整篩)", start:"2026-05-30 07:00", end:"2026-05-30 13:00", desc:"乳攝", location:"台北市信義區景勤里信安街47巷39號" },
    { subject:"萬華 待定", start:"2026-05-30 09:00", end:"2026-05-30 12:00", desc:"乳攝", location:"" },
    { subject:"信義 信義區整篩15", start:"2026-05-31 08:30", end:"2026-05-31 11:30", desc:"乳攝、子抹、腸篩、BC、成老健", location:"" },
    ];

    const TAGS = [
      { key: "乳攝", cls: "t-ms",  aliases: ["乳攝","乳房攝影","乳癌","乳癌篩檢","乳攝車"] },
      { key: "子抹", cls: "t-pap", aliases: ["子抹","抹片","子宮頸","子宮頸抹片","抹片篩檢"] },
      { key: "腸篩", cls: "t-fit", aliases: ["腸篩","大腸","大腸癌","糞便","fit"] },
      { key: "BC",   cls: "t-bc",  aliases: ["bc","bc肝","b肝","c肝","肝炎","肝篩"] },
      { key: "成老健", cls: "t-elder", aliases: ["成老健","整篩"] },
    ];

    const norm = (s) => (s ?? "").toString().trim().toLowerCase().replace(/\s+/g, " ");
    const pad2 = (n) => String(n).padStart(2, "0");

    function parseTags(desc) {
      const d = norm(desc);
      const out = [];
      for (const t of TAGS) {
        if (t.aliases.some(a => d.includes(norm(a)))) out.push(t);
      }
      return out;
    }

    function toDateTime(s){
      return new Date(s.replace(" ", "T") + ":00");
    }

    function isPastEvent(ev){
      const end = toDateTime(ev.end);
      const now = new Date();
      return !isNaN(end) && end.getTime() < now.getTime();
    }

    function formatTimeRange24(startStr, endStr){
      const start = toDateTime(startStr);
      const end   = toDateTime(endStr);
      if (isNaN(start) || isNaN(end)) return `${startStr} ~ ${endStr}`;

      const y = start.getFullYear();
      const m = pad2(start.getMonth() + 1);
      const d = pad2(start.getDate());
      const sh = pad2(start.getHours()), sm = pad2(start.getMinutes());
      const eh = pad2(end.getHours()),   em = pad2(end.getMinutes());

      return `${y}/${m}/${d} ${sh}:${sm}~${eh}:${em}`;
    }

    function searchTimeTokens(ev){
      const start = toDateTime(ev.start);
      const end = toDateTime(ev.end);
      if (isNaN(start) || isNaN(end)) return "";

      const y = start.getFullYear();
      const m = start.getMonth() + 1;
      const d = start.getDate();

      const sh = pad2(start.getHours()), sm = pad2(start.getMinutes());
      const eh = pad2(end.getHours()),   em = pad2(end.getMinutes());

      return [
        `${y}/${pad2(m)}/${pad2(d)}`,
        `${y}-${pad2(m)}-${pad2(d)}`,
        `${m}/${d}`,
        `${pad2(m)}/${pad2(d)}`,
        `${sh}:${sm}`,
        `${eh}:${em}`,
        `${start.getHours()}`,
        `${end.getHours()}`,
        `${sh}${sm}`,
        `${eh}${em}`,
      ].join(" ");
    }

    function makeMapUrl(address){
      return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(address);
    }

    function sortEvents(arr){
      return [...arr].sort((a,b)=>{
        const ta = toDateTime(a.start).getTime();
        const tb = toDateTime(b.start).getTime();
        return (isNaN(ta) ? 0 : ta) - (isNaN(tb) ? 0 : tb);
      });
    }

    // --- DOM ---
    const qEl = document.getElementById("q");
    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");
    const statusEl = document.getElementById("status");
    const statsEl = document.getElementById("stats");
    const clearBtn = document.getElementById("clearBtn");
    const fltEls = Array.from(document.querySelectorAll(".flt"));
    const showPastEl = document.getElementById("showPast");

    function getSelectedTags(){
      return fltEls.filter(x => x.checked).map(x => x.value);
    }

    // 小統計：未來 / 已結束
    function updateStats(){
      const past = events.filter(isPastEvent).length;
      const future = events.length - past;
      statsEl.textContent = `｜未來 ${future} 場 / 已結束 ${past} 場`;
    }

    function filterEvents(query, selectedTags){
      const q = norm(query);
      const selected = new Set(selectedTags.map(norm));
      const showPast = showPastEl?.checked === true;

      return sortEvents(events).filter(ev => {
        // 預設不顯示已結束
        if (!showPast && isPastEvent(ev)) return false;

        const tags = parseTags(ev.desc).map(t => t.key);
        const hasSelected = selected.size === 0 || tags.some(t => selected.has(norm(t)));
        if (!hasSelected) return false;

        if (!q) return true;

        const timeTokens = searchTimeTokens(ev);
        const hay = norm(`${ev.subject} ${ev.desc} ${ev.location} ${timeTokens}`);
        return hay.includes(q);
      });
    }

    function render(data, query){
      listEl.innerHTML = "";
      countEl.textContent = data.length;
      statusEl.textContent = (norm(query) && data.length === 0) ? "查無資料" : "";

      if (data.length === 0){
        const div = document.createElement("div");
        div.className = "empty";
        div.textContent = norm(query) ? "查無資料" : "尚無活動";
        listEl.appendChild(div);
        return;
      }

      for (const ev of data){
        const past = isPastEvent(ev);

        const card = document.createElement("div");
        card.className = "card";
        if (past) card.classList.add("past");

        const top = document.createElement("div");
        top.className = "top";

        const subject = document.createElement("div");
        subject.className = "subject";
        subject.textContent = ev.subject;

        top.appendChild(subject);

        if (past){
          const badge = document.createElement("span");
          badge.className = "past-badge";
          badge.textContent = "已結束";
          top.appendChild(badge);
        }

        card.appendChild(top);

        const tagsWrap = document.createElement("div");
        tagsWrap.className = "tags";

        const tags = parseTags(ev.desc);
        for (const t of tags){
          const tag = document.createElement("span");
          tag.className = `tag ${t.cls}`;
          tag.textContent = `[${t.key === "BC" ? "BC肝" : t.key}]`;
          tagsWrap.appendChild(tag);
        }
        card.appendChild(tagsWrap);

        const time = document.createElement("div");
        time.className = "time";
        time.textContent = formatTimeRange24(ev.start, ev.end);
        card.appendChild(time);

        const loc = document.createElement("div");
        loc.className = "loc";
        loc.textContent = `地點：${ev.location}`;
        card.appendChild(loc);

        const actions = document.createElement("div");
        actions.className = "actions";

        const map = document.createElement("a");
        map.className = "link";
        map.href = makeMapUrl(ev.location);
        map.target = "_blank";
        map.rel = "noopener noreferrer";
        map.textContent = "🗺️ map（Google 地圖）";

        actions.appendChild(map);
        card.appendChild(actions);

        listEl.appendChild(card);
      }
    }

    function update(){
      const data = filterEvents(qEl.value, getSelectedTags());
      render(data, qEl.value);
    }

    // events
    qEl.addEventListener("input", update);
    fltEls.forEach(el => el.addEventListener("change", update));
    showPastEl.addEventListener("change", update);

    clearBtn.addEventListener("click", () => {
      qEl.value = "";
      fltEls.forEach(el => el.checked = false);
      showPastEl.checked = false; // 回到預設：不顯示已結束
      qEl.focus();
      update();
    });

    // init
    updateStats();
    update();
  </script>
